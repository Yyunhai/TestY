services:
  mysql:
    image: mysql:8.0
    container_name: testy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 200612yhx
      MYSQL_DATABASE: testy_auth
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p200612yhx"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testy-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      TESTY_LOG_PATH: /app/logs
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/testy_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 200612yhx
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs

volumes:
  mysql-data:
