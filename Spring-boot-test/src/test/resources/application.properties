logging.config=classpath:logback-spring.xml
spring.datasource.url=jdbc:h2:mem:testy;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
testy.logging.base-path=${TESTY_LOG_PATH:${user.dir}/logs-test}
testy.logging.cleanup.enabled=false
