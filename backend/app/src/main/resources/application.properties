spring.application.name=testy-multi-module
logging.config=classpath:logback-spring.xml
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:30m}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/testy_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200612yhx}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200612Yhx@}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
testy.logging.base-path=${TESTY_LOG_PATH:${user.dir}/logs}
testy.logging.cleanup.enabled=${TESTY_LOG_CLEANUP_ENABLED:true}
testy.logging.cleanup.retention-days=${TESTY_LOG_RETENTION_DAYS:14}
testy.logging.cleanup.initial-delay-ms=${TESTY_LOG_CLEANUP_INITIAL_DELAY_MS:300000}
testy.logging.cleanup.interval-ms=${TESTY_LOG_CLEANUP_INTERVAL_MS:86400000}
testy.security.root.username=${TESTY_ROOT_USERNAME:root}
testy.security.root.email=${TESTY_ROOT_EMAIL:root@root.local}
testy.security.root.password=${TESTY_ROOT_PASSWORD:rootYsalu}
